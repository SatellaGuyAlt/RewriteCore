<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Emulator</title>
    <style>
        canvas {
            border: 1px solid black;
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">NES Emulator</h1>
    <canvas id="screen" width="256" height="240"></canvas>
    <div style="text-align: center;">
        <input type="file" id="romFile" accept=".nes">
        <button id="loadButton">Load ROM</button>
    </div>

    <script type="module">
        import { CPU6502, PPU } from './6502.js';

        const canvas = document.getElementById('screen');
        const context = canvas.getContext('2d');
        const imageData = context.getImageData(0, 0, 256, 240);
        const pixels = new Uint32Array(imageData.data.buffer);

        const cpu = new CPU6502();
        const ppu = new PPU();

        function renderScreen() {
            // Example of rendering. Replace with actual PPU rendering.
            for (let y = 0; y < 240; y++) {
                for (let x = 0; x < 256; x++) {
                    const color = Math.random() > 0.5 ? 0xFFFFFFFF : 0xFF000000; // White or black
                    pixels[y * 256 + x] = color;
                }
            }
            context.putImageData(imageData, 0, 0);
        }

        document.getElementById('loadButton').addEventListener('click', () => {
            const fileInput = document.getElementById('romFile');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a ROM file.');
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                const romData = new Uint8Array(reader.result);
                cpu.loadProgram(romData);
                console.log('ROM loaded and CPU initialized.');

                function emulateFrame() {
                    try {
                        for (let i = 0; i < 29781; i++) { // ~29780 cycles per frame
                            cpu.step();
                            ppu.step();
                        }
                        renderScreen();
                        requestAnimationFrame(emulateFrame);
                    } catch (e) {
                        console.error('Emulation error:', e);
                    }
                }

                emulateFrame();
            };

            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
